<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Suporte Técnico | HelpBot</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #1a365d 0%, #2c5282 50%, #2b6cb0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .main-container {
            width: 100%;
            max-width: 460px;
            position: relative;
        }

        #login-screen {
            background: white;
            border-radius: 16px;
            padding: 32px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            opacity: 1;
            transform: translateY(0);
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        #login-screen.fade-out {
            opacity: 0;
            transform: translateY(-20px);
            pointer-events: none;
        }

        .logo { text-align: center; margin-bottom: 24px; }
        .logo-icon {
            width: 56px; height: 56px;
            background: linear-gradient(135deg, #3182ce, #2c5282);
            border-radius: 14px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin-bottom: 12px;
        }
        .logo h2 { font-size: 1.3em; color: #2d3748; margin-bottom: 4px; }
        .logo p { font-size: 0.82em; color: #718096; }

        .form-group { margin-bottom: 14px; }
        .form-group label {
            display: block;
            font-size: 0.78em;
            font-weight: 600;
            color: #4a5568;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 6px;
        }
        .form-group input {
            width: 100%;
            padding: 11px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 0.9em;
            color: #2d3748;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }
        .form-group input:focus {
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(49,130,206,0.15);
        }
        .campo-erro {
            color: #e53e3e;
            font-size: 0.75em;
            margin-top: 4px;
            display: none;
        }

        .btn-primary {
            width: 100%;
            padding: 13px;
            background: linear-gradient(135deg, #3182ce, #2c5282);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.95em;
            font-weight: 600;
            cursor: pointer;
            margin-top: 6px;
            transition: transform 0.15s, box-shadow 0.15s, opacity 0.15s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(49,130,206,0.4);
            opacity: 0.92;
        }
        .btn-primary:active { transform: translateY(0); }

        #chat-container {
            background: white;
            border-radius: 16px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            display: none;
            flex-direction: column;
            opacity: 0;
            transform: translateY(20px);
            transition: opacity 0.5s ease, transform 0.5s ease;
            overflow: hidden;
        }
        #chat-container.fade-in {
            opacity: 1;
            transform: translateY(0);
        }

        .chat-header {
            background: linear-gradient(135deg, #2c5282, #3182ce);
            padding: 16px 20px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .chat-header-left { display: flex; align-items: center; gap: 10px; }
        .avatar {
            width: 36px; height: 36px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }
        .chat-header h3 { font-size: 0.95em; margin-bottom: 2px; }
        .chat-header span { font-size: 0.75em; opacity: 0.8; }

        #status-bar {
            background: #f7fafc;
            padding: 8px 16px;
            font-size: 0.75em;
            color: #718096;
            border-bottom: 1px solid #edf2f7;
            display: flex;
            gap: 16px;
        }
        #status-bar strong { color: #2d3748; }

        #chat-window {
            height: 360px;
            overflow-y: auto;
            padding: 16px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            scroll-behavior: smooth;
        }
        #chat-window::-webkit-scrollbar { width: 4px; }
        #chat-window::-webkit-scrollbar-thumb { background: #cbd5e0; border-radius: 99px; }

        .msg {
            padding: 10px 14px;
            border-radius: 14px;
            max-width: 85%;
            font-size: 0.88em;
            line-height: 1.5;
            animation: msgIn 0.25s ease;
        }
        @keyframes msgIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .user {
            background: linear-gradient(135deg, #3182ce, #2c5282);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }
        .bot {
            background: #f0f4f8;
            color: #2d3748;
            align-self: flex-start;
            border-bottom-left-radius: 4px;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            padding: 12px 16px;
            background: #f0f4f8;
            border-radius: 14px;
            border-bottom-left-radius: 4px;
            align-self: flex-start;
            animation: msgIn 0.25s ease;
        }
        .typing-dot {
            width: 7px; height: 7px;
            background: #a0aec0;
            border-radius: 50%;
            animation: bounce 1.2s infinite;
        }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            0%, 60%, 100% { transform: translateY(0); }
            30% { transform: translateY(-6px); }
        }

        .input-area {
            padding: 14px 16px;
            border-top: 1px solid #edf2f7;
            display: flex;
            gap: 10px;
            align-items: center;
        }
        #user-input {
            flex: 1;
            padding: 10px 14px;
            border: 1.5px solid #e2e8f0;
            border-radius: 24px;
            font-size: 0.88em;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        #user-input:focus {
            border-color: #3182ce;
            box-shadow: 0 0 0 3px rgba(49,130,206,0.12);
        }
        #send-btn {
            width: 40px; height: 40px;
            background: linear-gradient(135deg, #3182ce, #2c5282);
            border: none;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: transform 0.15s, box-shadow 0.15s;
            flex-shrink: 0;
        }
        #send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 4px 12px rgba(49,130,206,0.4);
        }
        #send-btn svg { width: 18px; height: 18px; fill: white; }

        #encerrado-screen {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 40px 32px;
            text-align: center;
            opacity: 0;
            transition: opacity 0.5s ease;
        }
        #encerrado-screen.fade-in { opacity: 1; }
        .encerrado-icon {
            width: 64px; height: 64px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            margin-bottom: 16px;
        }
        .icon-ok { background: #f0fff4; }
        .icon-tecnico { background: #fff5f5; }
        #encerrado-screen h3 { font-size: 1.1em; color: #2d3748; margin-bottom: 8px; }
        #encerrado-screen p { font-size: 0.85em; color: #718096; margin-bottom: 24px; line-height: 1.6; }
        .btn-nova {
            padding: 12px 32px;
            background: linear-gradient(135deg, #38a169, #276749);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 0.9em;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .btn-nova:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(56,161,105,0.4);
        }
    </style>
</head>
<body>

<div class="main-container">

    <!-- LOGIN -->
    <div id="login-screen">
        <div class="logo">
            <div class="logo-icon">🤖</div>
            <h2>HelpBot Suporte</h2>
            <p>Identifique-se para iniciar o atendimento</p>
        </div>

        <div class="form-group">
            <label>Nome completo</label>
            <input type="text" id="nome" placeholder="Seu nome completo" maxlength="60">
            <span class="campo-erro" id="nome-erro">Digite um nome válido (apenas letras e espaços, mínimo 3 caracteres).</span>
        </div>

        <div class="form-group">
            <label>Telefone</label>
            <input type="tel" id="telefone" placeholder="(11) 9 9999-9999" maxlength="16">
            <span class="campo-erro" id="tel-erro">Digite um telefone válido no formato (XX) 9 XXXX-XXXX.</span>
        </div>

        <div class="form-group">
            <label>E-mail corporativo</label>
            <input type="email" id="email" placeholder="seu@email.com">
            <span class="campo-erro" id="email-erro">Digite um e-mail válido.</span>
        </div>

        <button class="btn-primary" onclick="iniciarAtendimento()">Iniciar Atendimento</button>
    </div>

    <!-- CHAT -->
    <div id="chat-container">
        <div class="chat-header">
            <div class="chat-header-left">
                <div class="avatar">🤖</div>
                <div>
                    <h3>HelpBot</h3>
                    <span>Assistente de Suporte Técnico</span>
                </div>
            </div>
        </div>
        <div id="status-bar">
            <span>Protocolo: <strong id="prot-val">—</strong></span>
            <span>Status: <strong id="stat-val">—</strong></span>
        </div>
        <div id="chat-window"></div>
        <div class="input-area">
            <input type="text" id="user-input" placeholder="Descreva sua dúvida...">
            <button id="send-btn" onclick="enviarMensagem()" title="Enviar">
                <svg viewBox="0 0 24 24"><path d="M2 21l21-9L2 3v7l15 2-15 2v7z"/></svg>
            </button>
        </div>
        <div id="encerrado-screen">
            <div class="encerrado-icon" id="enc-icon"></div>
            <h3 id="enc-titulo"></h3>
            <p id="enc-msg"></p>
            <button class="btn-nova" onclick="reiniciarChat()">Nova Solicitação</button>
        </div>
    </div>

</div>

<script>
document.addEventListener('DOMContentLoaded', () => {

    // ── Máscara de telefone ──
    const tel = document.getElementById('telefone');
    tel.addEventListener('input', () => {
        let v = tel.value.replace(/\D/g, '').slice(0, 11);
        if (v.length <= 2) {
            v = v.replace(/^(\d{0,2})/, '($1');
        } else if (v.length <= 6) {
            v = v.replace(/^(\d{2})(\d{0,4})/, '($1) $2');
        } else if (v.length <= 10) {
            v = v.replace(/^(\d{2})(\d{4})(\d{0,4})/, '($1) $2-$3');
        } else {
            v = v.replace(/^(\d{2})(\d{1})(\d{4})(\d{0,4})/, '($1) $2 $3-$4');
        }
        tel.value = v;

        const erro = document.getElementById('tel-erro');
        const digitos = tel.value.replace(/\D/g, '');
        if (tel.value.length > 0 && digitos.length < 10) {
            erro.style.display = 'block';
            tel.style.borderColor = '#e53e3e';
        } else {
            erro.style.display = 'none';
            tel.style.borderColor = '#e2e8f0';
        }
    });

    // ── Validação de nome em tempo real ──
    const nomeInput = document.getElementById('nome');
    nomeInput.addEventListener('input', () => {
        const val = nomeInput.value.trim();
        const erro = document.getElementById('nome-erro');
        const regex = /^[a-zA-ZÀ-ÿ\s]{3,}$/;
        if (val.length > 0 && !regex.test(val)) {
            erro.style.display = 'block';
            nomeInput.style.borderColor = '#e53e3e';
        } else {
            erro.style.display = 'none';
            nomeInput.style.borderColor = '#e2e8f0';
        }
    });

    // ── Validação de e-mail em tempo real ──
    const emailInput = document.getElementById('email');
    emailInput.addEventListener('input', () => {
        const val = emailInput.value.trim();
        const erro = document.getElementById('email-erro');
        const valido = val.includes('@') && val.includes('.') && val.length > 5;
        if (val.length > 0 && !valido) {
            erro.style.display = 'block';
            emailInput.style.borderColor = '#e53e3e';
        } else {
            erro.style.display = 'none';
            emailInput.style.borderColor = '#e2e8f0';
        }
    });

    // ── Enter para enviar ──
    document.getElementById('user-input').addEventListener('keydown', e => {
        if (e.key === 'Enter') enviarMensagem();
    });

});
</script>
<script src="chat.js"></script>
</body>
</html>
